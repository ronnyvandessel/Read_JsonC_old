name: Composite action

on:
  
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  
permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse config
        id: parse
        uses: RonnyVanDessel/composite_test_pws@main
        with:
          path: Params.jsonc

      - name: Result
        run: echo "Targets = ${{ steps.parse.outputs.targets_r0 }}"
             echo "Aantal Lijnen = ${{ steps.parse.outputs.lines_count }}"
             
