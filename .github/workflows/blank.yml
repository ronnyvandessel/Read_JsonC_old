name: Use JSONC Parameters

 

on:

  workflow_dispatch:
 
jobs:

  read-jsonc:

    runs-on: ubuntu-latest

 

    steps:

      - name: Checkout repo

      uses: actions/checkout@v4

 

      - name: Load and clean JSONC

        id: clean

        run: |

          echo "Stripping comments from JSONC..."

 

          # Remove // comments and trailing inline comments

          CLEAN=$(sed 's,//.*$,,' .github/parameters.jsonc)

 

          # Remove /* */ block comments (multi-line)

          CLEAN=$(echo "$CLEAN" | sed '/\/\*/,/\*\//d')

 

          echo "clean_json=$CLEAN" >> $GITHUB_OUTPUT

 

      - name: Validate JSON

        run: |

          echo "Validating JSON..."

          echo '${{ steps.clean.outputs.clean_json }}' | jq .

          echo "JSON is valid!"

 

      - name: Extract values

        id: params

        run: |

          JSON='${{ steps.clean.outputs.clean_json }}'

          echo "displayname=$(echo $JSON | jq -r '.Displayname[0]')" >> $GITHUB_OUTPUT

          echo "r0=$(echo $JSON | jq -c '.Targets_R0')" >> $GITHUB_OUTPUT

          echo "r1=$(echo $JSON | jq -c '.Targets_R1')" >> $GITHUB_OUTPUT

          echo "r2=$(echo $JSON | jq -c '.Targets_R2')" >> $GITHUB_OUTPUT

 

      - name: Print extracted values

        run: |

          echo "Displayname: ${{ steps.params.outputs.displayname }}"

          echo "R0: ${{ steps.params.outputs.r0 }}"

          echo "R1: ${{ steps.params.outputs.r1 }}"

          echo "R2: ${{ steps.params.outputs.r2 }}"

 

      - name: Loop through R0 targets

        run: |

          echo "Looping Targets_R0..."

          for target in $(echo '${{ steps.params.outputs.r0 }}' | jq -r '.[]'); do

            echo "Processing: $target"

          done

 

